services:
  postgres:
    image: postgres:16-alpine
    container_name: digital-twin-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-digitaltwin}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: digital-twin-mqtt
    ports:
      - "1883:1883"
    volumes:
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    networks:
      - internal

  app:
    image: ghcr.io/firedisposal/digital-twin:${IMAGE_TAG:-latest}
    container_name: digital-twin-app
    ports:
      - "3000:3000"
      - "5858:5858"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  mosquitto_data:
  mosquitto_log:
