version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: digital-twin-db
    environment:
      POSTGRES_USER: digitaltwin
      POSTGRES_PASSWORD: digitaltwin_prod_password
      POSTGRES_DB: digitaltwin
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U digitaltwin"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal
    restart: unless-stopped

  app:
    image: ghcr.io/firedisposal/digital-twin:${IMAGE_TAG:-latest}
    container_name: digital-twin-app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
